<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Update your Borrow Bazar profile with your name, college, and profile picture to personalize your campus marketplace experience.">
    <title>Profile - Borrow Bazar</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>
  <a href="index.html" class="brand">
    <div class="logo"></div>
    <div class="name">borrowbazar</div>
  </a>

<nav id="navbar">
<a href="index.html">Home</a>
<a href="feedback.html">Feedback</a>
<a href="sell.html">Sell</a>
<a href="cart.html" id="cartCount">Cart (0)</a>
<a href="orders.html">Orders</a>
<a href="login.html" id="loginLink">Login</a>
<a href="#" id="logoutLink" style="display:none" onclick="logout()">Logout</a>
</nav>
</header>

<main>
<div id="content" style="display:flex; flex-direction:column; align-items:center; padding-top:50px; height: auto; min-height: 600px;">
    
    <div style="background:white; padding:40px; border-radius:20px; box-shadow:0 10px 30px rgba(0,0,0,0.2); width: 400px;">
        <h2 style="text-align:center; margin-bottom:30px">Set Your Profile</h2>

        <div style="margin-bottom:20px">
            <label style="display:block; margin-bottom:5px; font-weight:500">Name</label>
            <input type="text" id="name" placeholder="Enter your name" style="width:100%; padding:10px; border-radius:8px; border:1px solid #ddd">
        </div>

        <div style="margin-bottom:20px">
            <label style="display:block; margin-bottom:5px; font-weight:500">College</label>
            <input type="text" id="college" placeholder="Enter your college" style="width:100%; padding:10px; border-radius:8px; border:1px solid #ddd">
        </div>

        <div style="margin-bottom:30px">
            <label style="display:block; margin-bottom:5px; font-weight:500">Profile Picture</label>
            <input type="file" id="photo" style="width:100%">
        </div>

        <div style="text-align:center">
            <button onclick="saveProfile()" style="margin:0; width:100%">Save Profile</button>
        </div>
    </div>

</div>
</main>

<footer>
    <div class="footer-content">
    
    <div class="foot-pannel1">
      
      <div class="logo"></div>
      <h2>borrowbazar</h2>
      <p>Buy | Sell | Rent</p>
      <p>easily on campus</p>
    </div>

    <div class="foot-pannel2">
      <h4>Quick Links</h4>
      <p><a href="index.html">Home</a></p>
      <p><a href="feedback.html">Feedback</a></p>
    </div>

    <div class="foot-pannel3">
      <h4>Follow Us</h4>
      <p><a href="https://www.instagram.com/borrowbazar" target="_blank">Instagram</a></p>
      <p><a href="https://www.facebook.com/borrowbazar" target="_blank">Facebook</a></p>
    
    </div> 

    <div class="foot-pannel4">
      <h4>Contact Us</h4>
      <p><a href="https://mail.google.com/mail/u/0/?fs=1&to=borrowbazar.iitp@gmail.com&su=Feedback&body=Hello,%20I%20would%20like%20to%20provide%20feedback%20about%20Borrow%20Bazar." target="_blank">Email</a></p>
    </div>

  </div>

   <div class="foot-lower">
    Borrow Bazar © 2026 | Made for Students
 </div>
</footer>

<script src="js/script.js" defer></script>
<script src="js/profile.js" defer></script>
</body>
</html>
