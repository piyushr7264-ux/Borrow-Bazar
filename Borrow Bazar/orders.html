<script src="js/script.js" defer></script>
<script>
async function loadOrders() {
  const token = localStorage.getItem("token");
  const div = document.getElementById("orders");

  if (!token) {
    div.innerHTML = "<p style='color:white;text-align:center'>Please <a href='login.html' style='color: #007bff'>login</a> to view your orders.</p>";
    return;
  }

  try {
    const response = await fetch(`${API_URL}/orders`, {
      headers: { 'Authorization': `Bearer ${token}` }
    });
    
    if (response.status === 401 || response.status === 403) {
      div.innerHTML = "<p style='color:white;text-align:center'>Session expired. Please login again.</p>";
      return;
    }

    const orders = await response.json();

    if (orders.length === 0) {
      div.innerHTML = "<p style='color:white;text-align:center'>No orders yet</p>";
    } else {
      orders.forEach(item => {
        div.innerHTML += `
          <div class="product" style="position:relative">
          <button onclick="cancelOrder(${item.id})" style="position:absolute; top:10px; right:10px; background:red; padding:5px 10px; font-size:12px; margin:0">Cancel</button>
          <img src="${item.img}" width="120" alt="${item.product_name}" loading="lazy">
          <h3>${item.product_name}</h3>
          <p>₹${item.price}</p>
          <p style="font-size: 0.9em; color: #333; background: #eee; padding: 5px; border-radius: 5px; margin: 10px 0;">Details: ${item.details || 'N/A'}</p>
          <p style="font-size: 0.8em; color: #ccc">${new Date(item.timestamp).toLocaleString()}</p>
          </div>
        `;
      });
    }
  } catch (err) {
    console.error("Fetch orders error:", err);
    div.innerHTML = "<p style='color:white;text-align:center'>Error loading orders.</p>";
  }
}

async function cancelOrder(id) {
  if (!confirm("Are you sure you want to cancel this order?")) return;

  const token = localStorage.getItem("token");
  try {
    const response = await fetch(`${API_URL}/orders/${id}`, {
      method: 'DELETE',
      headers: { 'Authorization': `Bearer ${token}` }
    });

    if (response.ok) {
      alert("Order canceled successfully.");
      location.reload();
    } else {
      alert("Failed to cancel order.");
    }
  } catch (err) {
    console.error("Cancel order error:", err);
  }
}

document.addEventListener("DOMContentLoaded", loadOrders);
</script>
